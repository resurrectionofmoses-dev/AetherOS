<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>AetherOS | The Maestro's Sovereign Network</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0ea5e9">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-neutral: #000000; 
        --bg-panel: #050505;
        --bg-card: #0a0a0a;
        --text-main: #e5e7eb;  
        --text-muted: #6b7280;
        --accent-blue: #3b82f6;
        --accent-gold: #f59e0b;
        --accent-green: #10b981;
        --border-stone: #111111;
        --border-bright: #333333;
      }
      
      body {
        background-color: var(--bg-neutral);
        color: var(--text-main);
        font-family: 'JetBrains Mono', monospace;
        height: 100vh;
        width: 100vw;
        margin: 0;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }

      /* High-Precision 300DPI Scaling Protocol */
      .dpi-300-shield {
        transform-origin: top left;
        image-rendering: -webkit-optimize-contrast;
        image-rendering: crisp-edges;
      }

      /* CRITICAL: Fix for scroll containers in nested flex boxes */
      .flex-hinge {
        min-height: 0;
        min-width: 0;
      }

      /* THE QUANTUM LATTICE OVERLAY */
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 0);
        background-size: 8px 8px;
        pointer-events: none;
        z-index: 9999;
      }

      .font-mono { font-family: 'JetBrains Mono', monospace; }

      .glass-card {
        background: rgba(0, 0, 0, 0.95);
        backdrop-filter: blur(0px);
        border: 2px solid #111;
        box-shadow: 4px 4px 0px 0px #000;
      }

      /* Scrollbar Optimization for the Maestro: Thick & Visible */
      .custom-scrollbar::-webkit-scrollbar {
        width: 12px;
        height: 12px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #000;
        border-left: 1px solid #111;
        box-shadow: inset 0 0 5px rgba(0,0,0,0.5);
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #333;
        border: 2px solid #000;
        border-radius: 6px;
        box-shadow: 0 0 10px rgba(0,0,0,0.5);
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #ef4444; /* High-intensity Red on hover */
        border-color: #7f1d1d;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:active {
        background: #f59e0b; /* Gold on active drag */
      }

      @keyframes quantized-pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.8; transform: scale(1.02); }
      }
      
      .quantized-motion {
        animation: quantized-pulse 1s steps(4) infinite;
      }

      pre { 
        background: #000; 
        color: #0f0; 
        padding: 1rem; 
        border: 2px solid #111;
        font-size: 0.85rem; 
        line-height: 1.5;
        overflow-x: auto;
      }

      .wisdom-glow {
        text-shadow: 2px 2px 0px rgba(0,0,0,1), 0 0 15px rgba(255,255,255,0.1);
      }

      .aero-panel {
        position: relative;
        overflow: hidden;
      }

      @keyframes holographic-shimmer {
          0% { background-position: 0% 50%; }
          50% { background-position: 100% 50%; }
          100% { background-position: 0% 50%; }
      }

      .holographic-bg {
          position: relative;
      }

      .holographic-bg::before {
          content: "";
          position: absolute;
          inset: 0;
          background: linear-gradient(
              135deg,
              rgba(0, 0, 0, 0) 0%,
              rgba(6, 182, 212, 0.05) 25%,
              rgba(168, 85, 247, 0.05) 50%,
              rgba(6, 182, 212, 0.05) 75%,
              rgba(0, 0, 0, 0) 100%
          );
          background-size: 400% 400%;
          animation: holographic-shimmer 12s ease infinite;
          pointer-events: none;
          z-index: 0;
      }

      @keyframes glitch-line {
          0% { transform: translateY(-100%); opacity: 0; }
          50% { opacity: 1; }
          100% { transform: translateY(1000%); opacity: 0; }
      }
    </style>
    <link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
